# OptimalFit — iOS cloud build (the Mac-less path).
#
# iOS apps can only be compiled on macOS, so this workflow runs on a GitHub-
# hosted Mac. Trigger it manually (Actions tab -> "iOS build (IPA)" -> Run
# workflow) after pushing this repo to GitHub and adding the secrets below.
#
# REQUIRED repository secrets (Settings -> Secrets and variables -> Actions):
#   APPLE_CERT_P12_BASE64        Apple Distribution certificate (.p12) as base64.
#                                Export from Keychain/Developer portal, then:
#                                  PowerShell: [Convert]::ToBase64String([IO.File]::ReadAllBytes("cert.p12"))
#   CERT_PASSWORD                Password chosen when exporting the .p12.
#   PROVISIONING_PROFILE_BASE64  App Store provisioning profile for
#                                com.optimalfit.app (.mobileprovision) as base64
#                                (same conversion as above).
#   APPLE_TEAM_ID                10-character Team ID (Developer portal -> Membership).
#
# OPTIONAL secrets for the commented TestFlight upload step at the bottom:
#   APP_STORE_CONNECT_KEY_ID     App Store Connect API key ID
#   APP_STORE_CONNECT_ISSUER_ID  App Store Connect issuer ID
#   APP_STORE_CONNECT_KEY_B64    The AuthKey_<KEYID>.p8 file as base64
#
# Full step-by-step for exporting each of these: docs/IOS-SHIP-GUIDE.md

name: iOS build (IPA)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Capacitor deps
        working-directory: native
        run: npm ci

      - name: Sync web assets into the iOS project
        working-directory: native
        run: npm run copy-web && npx cap sync ios

      - name: Import signing certificate into a temporary keychain
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          KEYCHAIN_PWD=$(uuidgen)
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo -n "$APPLE_CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          PP_UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -o - -)
          PP_NAME=$(security cms -D -i "$PP_PATH" | plutil -extract Name raw -o - -)
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PP_UUID.mobileprovision"
          echo "PP_NAME=$PP_NAME" >> "$GITHUB_ENV"
          echo "Installed profile: $PP_NAME ($PP_UUID)"

      - name: Archive (xcodebuild, manual signing)
        working-directory: native/ios/App
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PP_NAME"

      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.optimalfit.app</key>
              <string>$PP_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"
          ls -la "$RUNNER_TEMP/export"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: OptimalFit-ios-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error

      # ------------------------------------------------------------------
      # OPTIONAL: upload straight to TestFlight. Uncomment after adding the
      # three APP_STORE_CONNECT_* secrets (App Store Connect -> Users and
      # Access -> Integrations -> App Store Connect API -> generate a key
      # with "App Manager" role; download the .p8 ONCE and base64 it).
      # ------------------------------------------------------------------
      # - name: Upload to TestFlight
      #   env:
      #     APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      #     APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      #     APP_STORE_CONNECT_KEY_B64: ${{ secrets.APP_STORE_CONNECT_KEY_B64 }}
      #   run: |
      #     mkdir -p "$HOME/private_keys"
      #     echo -n "$APP_STORE_CONNECT_KEY_B64" | base64 --decode \
      #       -o "$HOME/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8"
