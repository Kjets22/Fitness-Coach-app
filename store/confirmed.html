<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OptimalFit — Email confirmed</title>
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #0a0e17; color: #e7ecf5; text-align: center; padding: 24px;
  }
  @media (prefers-color-scheme: light) { body { background: #f2f4fa; color: #1c2333; } }
  .card { max-width: 420px; }
  .badge {
    width: 72px; height: 72px; margin: 0 auto 20px; border-radius: 22px;
    display: flex; align-items: center; justify-content: center; font-size: 40px;
    background: linear-gradient(135deg, #8b5cf6, #22d3ee);
  }
  h1 { font-size: 1.5rem; margin: 0 0 10px; letter-spacing: -0.02em; }
  p { line-height: 1.55; opacity: 0.8; margin: 0 0 8px; }
  .hint { font-size: 0.85rem; opacity: 0.55; margin-top: 18px; }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">✓</div>
    <h1>Email confirmed!</h1>
    <p>Your OptimalFit account is ready.</p>
    <p><strong>Return to the OptimalFit app and sign in</strong> with your email and password.</p>
    <p class="hint">You can close this page.</p>
  </div>
</body>
</html>
